<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/blok-yerlestirme/">
  <title>Dahis Blok Yerleştirme | dahi's One</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="blok-yerlestirme.css">
</head>
<body class="blok-page">
  <div id="nav-placeholder"></div>
  <header class="blok-header">
    <a href="/eglence" class="blok-back" data-i18n="blok.back">← Eğlence</a>
    <h1 class="blok-title" data-i18n="blok.title">Dahis Blok Yerleştirme</h1>
    <p class="blok-subtitle" data-i18n="blok.subtitle">Blokları stratejik yerleştir, alanı tamamen doldur.</p>
  </header>
  <main class="blok-main">
    <div class="blok-game-wrap">
      <div class="blok-score-bar">
        <span class="blok-score-label" data-i18n="blok.score">Puan:</span>
        <span class="blok-score-val" id="scoreVal">0</span>
      </div>
      <div class="blok-board-wrap">
        <div class="blok-board" id="blokBoard"></div>
      </div>
      <div class="blok-pieces" id="blokPieces"></div>
      <div class="blok-actions">
        <button type="button" class="blok-btn blok-btn-undo" id="btnUndo" disabled data-i18n="blok.undo">Geri Al</button>
        <button type="button" class="blok-btn blok-btn-new" id="btnNew" data-i18n="blok.new_game">Yeni Oyun</button>
      </div>
      <p class="blok-hint" data-i18n="blok.hint">Bir blok seç, ardından tahtaya tıklayarak yerleştir.</p>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/includes/load-common.js"></script>
  <script src="blok-yerlestirme.js"></script>
</body>
</html>
