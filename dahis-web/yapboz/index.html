<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/yapboz/">
  <title>Karakter Yapbozu – dahi's One</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="yapboz.css">
</head>
<body class="yapboz-page">
  <div id="nav-placeholder"></div>

  <header class="yapboz-header">
    <a href="/eglence" class="yapboz-back" data-i18n="yapboz.back">← Eğlence</a>
    <h1 class="yapboz-title" data-i18n="yapboz.title">Karakter Yapbozu</h1>
    <p class="yapboz-subtitle" data-i18n="yapboz.subtitle">Parçaları kaydırarak resmi tamamla.</p>
  </header>

  <main class="yapboz-main">
    <div class="yapboz-game-wrap">
      <div class="yapboz-board-wrap">
        <div class="yapboz-board" id="yapbozBoard" role="grid"></div>
      </div>
      <p class="yapboz-char-name" id="charName"></p>
      <div class="yapboz-actions">
        <button type="button" class="yapboz-btn yapboz-btn-undo" id="btnUndo" disabled data-i18n="yapboz.undo">Geri al</button>
        <button type="button" class="yapboz-btn yapboz-btn-shuffle" id="btnShuffle" data-i18n="yapboz.shuffle">Karıştır</button>
      </div>
      <details class="yapboz-how">
        <summary data-i18n="yapboz.how_title">Nasıl oynanır?</summary>
        <p data-i18n="yapboz.how_text">Boş kareye bitişik parçaya tıklayarak parçayı kaydır. Tüm parçaları sıraya getirerek resmi tamamla.</p>
      </details>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/includes/load-common.js"></script>
  <script src="yapboz.js"></script>
</body>
</html>
