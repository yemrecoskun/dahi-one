<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <base href="/character-sudoku/">
  <title>Dahis Sudoku – dahi's One</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="character-sudoku.css">
</head>
<body class="cs-page">
  <div id="nav-placeholder"></div>

  <header class="cs-header">
    <a href="/eglence" class="cs-back" data-i18n="cs.back">← Eğlence</a>
    <h1 class="cs-title" data-i18n="cs.title">Dahis Sudoku</h1>
    <p class="cs-subtitle" data-i18n="cs.subtitle">Her satır, sütun ve bölgede her karakter bir kez.</p>
  </header>

  <main class="cs-main">
    <div class="cs-game-wrap">
      <div class="cs-grid-wrap">
        <div class="cs-grid" id="csGrid" role="grid" aria-label="Sudoku alanı"></div>
      </div>

      <div class="cs-controls">
        <button type="button" class="cs-ctrl-btn" id="btnHint" data-i18n="cs.hint">
          <span class="cs-ctrl-icon">💡</span> İpucu
        </button>
        <button type="button" class="cs-ctrl-btn" id="btnNotes">
          <span class="cs-ctrl-icon">✎</span> <span id="notesLabel">Notlar KAPALI</span>
        </button>
      </div>

      <div class="cs-keypad">
        <div class="cs-num-keys" id="numKeys"></div>
        <div class="cs-action-keys">
          <button type="button" class="cs-key cs-key-delete" id="btnDelete" data-i18n="cs.delete">
            <span class="cs-key-icon">✕</span> Sil
          </button>
          <button type="button" class="cs-key cs-key-undo" id="btnUndo" disabled data-i18n="cs.undo">
            <span class="cs-key-icon">↶</span> Geri al
          </button>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/includes/load-common.js"></script>
  <script src="character-sudoku.js"></script>
</body>
</html>
