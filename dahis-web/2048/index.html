<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <base href="/2048/">
  <title>2048 | dahi's One</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="2048.css">
</head>
<body class="g2048-page">
  <div id="nav-placeholder"></div>
  <header class="g2048-header">
    <a href="/eglence" class="g2048-back" data-i18n="g2048.back">← Eğlence</a>
    <h1 class="g2048-title" data-i18n="g2048.title">2048</h1>
    <p class="g2048-subtitle" data-i18n="g2048.subtitle">Aynı sayıları birleştir, 2048'e ulaş.</p>
    <p class="g2048-score"><span data-i18n="g2048.score_label">Skor</span>: <strong id="score">0</strong></p>
    <button id="restartBtn" class="g2048-restart" data-i18n="g2048.restart">Yeniden Başlat</button>
  </header>
  <main class="g2048-main">
    <div class="g2048-game-wrap">
      <div class="g2048-grid" id="grid"></div>
      <p class="g2048-hint" data-i18n="g2048.hint">Ok tuşları veya kaydır</p>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/includes/load-common.js"></script>
  <script src="2048.js"></script>
</body>
</html>
